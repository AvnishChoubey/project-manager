spring.application.name=project-manager-service

spring.datasource.url=jdbc:mysql://localhost:3306/project_manager?useSSL=false&serverTimezone=UTC
spring.datasource.username=DB_USER
spring.datasource.password=DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

# Hibernate ddl auto options:
# validate | update | create | create-drop | none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


